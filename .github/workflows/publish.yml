# Publishes to npm via OIDC trusted publishing (provenance, no NODE_AUTH_TOKEN).
# Requires the npmjs Trusted Publisher config on the package:
#   owner: peturgeorgievv, repo: n8n-nodes-postfast, workflow: publish.yml
name: Publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm publish
        env:
          NPM_CONFIG_PROVENANCE: true
